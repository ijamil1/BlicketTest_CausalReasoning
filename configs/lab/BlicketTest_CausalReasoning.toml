model = "Qwen/Qwen3-30B-A3B-Instruct-2507"
max_steps = 500
batch_size = 250
rollouts_per_example = 10
learning_rate = 1.5e-5

[buffer]
online_difficulty_filtering = true

[sampling]
max_tokens = 7000

[[env]]
id = "irfanjamil/BlicketTest_CausalReasoning@0.1.3"
args = { num_examples = 250 }

[eval]
interval = 400                    # Evaluate every 400 steps

[[eval.env]]
id = "irfanjamil/BlicketTest_CausalReasoning@0.1.3"
num_examples = 100
rollouts_per_example = 3
